services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-pull-model:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen3:4b"]
    restart: "no"

  ollama-pull-embedding-model:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    restart: "no"

  countries-mcp-server:
    build:
      context: .
      dockerfile: countries-mcp-server/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - COUNTRIES_API_KEY=${COUNTRIES_API_KEY:?COUNTRIES_API_KEY must be set in .env}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_assistant"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - COUNTRIES_MCP_URL=http://countries-mcp-server:8081
      - WEATHER_API_KEY=${WEATHER_API_KEY:?WEATHER_API_KEY must be set in .env}
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/ai_assistant
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull-model:
        condition: service_completed_successfully
      ollama-pull-embedding-model:
        condition: service_completed_successfully
      countries-mcp-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  ollama_data:
  postgres_data:
