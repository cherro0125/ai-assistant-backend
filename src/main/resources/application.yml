spring:
  application:
    name: ai-assistant
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: qwen3:4b
    mcp:
      client:
        sse:
          connections:
            countries:
              url: ${COUNTRIES_MCP_URL:http://localhost:8081}
              sse-endpoint: /sse
        stdio:
          connections:
            weather:
              command: weather-mcp/node_modules/.bin/tsx
              args:
                - weather-mcp/src/index.ts
              env:
                WEATHER_API_URL: https://api.weatherapi.com/v1/current.json
                WEATHER_API_KEY: ${WEATHER_API_KEY}
